name: Release Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Lint PHP files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f -name "*.php" | sort)
          for file in "${files[@]}"; do
            php -l "$file"
          done

      - name: Prepare package archive
        shell: bash
        run: |
          set -euo pipefail
          repo_name="eos-tools-${GITHUB_REF_NAME}"
          mkdir -p dist
          git archive --format=zip --output="dist/${repo_name}.zip" HEAD

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
